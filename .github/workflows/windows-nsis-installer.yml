name: windows-nsis-installer

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        shell: powershell
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        shell: powershell
        run: |
          $gobin = Join-Path (go env GOPATH) "bin"
          $gobin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y

      - name: Add NSIS to PATH
        shell: powershell
        run: |
          $nsis = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          $makensis = Join-Path $nsis "makensis.exe"
          if (!(Test-Path $makensis)) {
            throw "makensis.exe not found at $makensis"
          }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Test
        shell: powershell
        run: go test ./cmd/baize-desktop ./internal/...

      - name: Resolve build version
        shell: powershell
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = "v0.0.$env:GITHUB_RUN_NUMBER"
          }
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build desktop installer
        shell: powershell
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            ./scripts/package-desktop-windows.ps1 -Version $env:BUILD_VERSION -DebugMode
          } else {
            ./scripts/package-desktop-windows.ps1 -Version $env:BUILD_VERSION
          }

      - name: Verify installer output
        shell: powershell
        run: |
          $installer = Join-Path "dist" ("baize-{0}-amd64-installer.exe" -f $env:BUILD_VERSION)
          if (-not (Test-Path $installer)) {
            Get-ChildItem -Path cmd/baize-desktop/build -Recurse | Select-Object FullName
            Get-ChildItem -Path dist -Recurse | Select-Object FullName
            throw "Versioned NSIS installer was not generated."
          }
          Get-Item $installer | Select-Object FullName, Length
          "INSTALLER_PATH=$installer" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: baize-desktop-windows-amd64
          path: ${{ env.INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish installer to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $title = $tag
          $releaseReady = $false

          try {
            gh release create $tag --title $title --generate-notes | Out-Null
          } catch {
            Write-Host "Release $tag may already exist; continuing."
          }

          for ($attempt = 0; $attempt -lt 6; $attempt++) {
            try {
              gh release view $tag --json url | Out-Null
              $releaseReady = $true
              break
            } catch {
              Start-Sleep -Seconds 5
              Write-Host "Waiting for GitHub release $tag to become available..."
            }
          }

          if (-not $releaseReady) {
            throw "GitHub release $tag is not available."
          }

          gh release upload $tag $env:INSTALLER_PATH --clobber
