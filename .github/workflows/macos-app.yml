name: macos-app

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  build-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set build cache env
        run: |
          echo "GOCACHE=$RUNNER_TEMP/go-build" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/go-build"

      - name: Resolve build version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="v0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "BUILD_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Test
        run: go test ./cmd/baize-desktop ./internal/...

      - name: Build signed and notarized DMG
        env:
          MACOS_BUILD_PLATFORM: darwin/arm64
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./scripts/package-desktop-macos.sh "${BUILD_VERSION}"

      - name: Verify notarized output
        run: |
          APP_PATH="$(find cmd/baize-desktop/build/bin -maxdepth 1 -type d -name '*.app' | head -n 1)"
          DMG_PATH="dist/baize-macos-${BUILD_VERSION}.dmg"
          if [ -z "${APP_PATH}" ] || [ ! -d "${APP_PATH}" ]; then
            ls -R cmd/baize-desktop/build
            echo "Error: .app bundle was not generated."
            exit 1
          fi
          if [ -z "${DMG_PATH}" ] || [ ! -f "${DMG_PATH}" ]; then
            ls -R dist
            echo "Error: DMG was not generated."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"
          xcrun stapler validate "${DMG_PATH}"
          ls -lh "${APP_PATH}" "${DMG_PATH}"
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"
          echo "DMG_PATH=${DMG_PATH}" >> "$GITHUB_ENV"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: baize-desktop-macos-arm64
          path: |
            ${{ env.APP_PATH }}
            ${{ env.DMG_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish DMG to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${tag}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${title}" --generate-notes >/dev/null 2>&1 || true
            if ! gh release view "${tag}" >/dev/null 2>&1; then
              sleep 5
              gh release view "${tag}" >/dev/null 2>&1
            fi
          fi
          gh release upload "${tag}" "${DMG_PATH}" --clobber
